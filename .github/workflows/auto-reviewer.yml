name: Auto Reviewer by Diff Keyword
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-diff:
    runs-on: ubuntu-latest
    # This block was the culprit
    permissions:
      pull-requests: write # Needed for assigning reviewers
      contents: read       # REQUIRED for actions/checkout to work
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Diff for Keyword
        id: scan
        run: |
          git fetch origin ${{ github.base_ref }}
          # Check for the keyword in added lines (+)
          if git diff origin/${{ github.base_ref }}...HEAD | grep "^\+" | grep -i "THATSCHEMA"; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Assign Team
        if: steps.scan.outputs.match == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Use context.issue.number or context.payload.pull_request.number
            github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: ['pangan'],
              team_reviewers: ['your-team-slug'] 
            })