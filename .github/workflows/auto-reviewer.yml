name: Checking for 3rd party Datasharing review
on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-diff:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Diff for Keyword
        id: scan
        run: |
          git fetch origin ${{ github.base_ref }}
          KEYWORDS="THATSCHEMA|BRAZE|AUDITBOARD"
          
          if git diff origin/${{ github.base_ref }}...HEAD | grep "^\+" | grep -Ei "$KEYWORDS"; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify Mandatory Reviewers
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isMatch = "${{ steps.scan.outputs.match }}" === "true";
            const prNumber = context.payload.pull_request.number;
            const orgName = context.repo.owner;
            const repoName = context.repo.repo;

            // --- CONFIGURATION: ADD YOUR LISTS HERE ---
            const mandatoryUsers = ["pangan",]; 
            const mandatoryTeams = []; 
            // ------------------------------------------

            if (!isMatch) {
              console.log("✅ No sensitive keywords found. Extra reviews not mandatory.");
              return;
            }

            console.log("🔍 Keywords found. Checking for mandatory approvals...");

            // 1. Request Reviewers (ensure they are on the list)
            await github.rest.pulls.requestReviewers({
              owner: orgName,
              repo: repoName,
              pull_number: prNumber,
              reviewers: mandatoryUsers,
              team_reviewers: mandatoryTeams
            });

            // 2. Fetch all reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: orgName,
              repo: repoName,
              pull_number: prNumber,
            });

            // Get only the LATEST review state for each user
            const latestReviews = {};
            reviews.forEach(r => {
              latestReviews[r.user.login] = r.state;
            });

            let missingApprovals = [];

            // 3. Verify Users: Every user in the list must have 'APPROVED'
            for (const user of mandatoryUsers) {
              if (latestReviews[user] !== 'APPROVED') {
                missingApprovals.push(`User: @${user}`);
              }
            }

            // 4. Verify Teams: At least one person from EACH team must have 'APPROVED'
            for (const teamSlug of mandatoryTeams) {
              const { data: members } = await github.rest.teams.listMembersInOrg({
                org: orgName,
                team_slug: teamSlug,
              });
              
              const memberLogins = members.map(m => m.login);
              const teamHasApproved = memberLogins.some(login => latestReviews[login] === 'APPROVED');

              if (!teamHasApproved) {
                missingApprovals.push(`Team: ${teamSlug} (at least one member)`);
              }
            }

            // 5. Final Decision
            if (missingApprovals.length > 0) {
              core.setFailed(`🛑 Mandatory approvals missing from: ${missingApprovals.join(', ')}`);
            } else {
              console.log("✅ All mandatory individual and team approvals are present!");
            }