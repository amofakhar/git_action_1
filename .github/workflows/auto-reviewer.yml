name: Checking for 3rd party Datasharing review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

# This is the key! It cancels old runs and groups everything by PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-diff:
    # Use a clear name for Branch Protection
    name: Mandatory Data Review Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Diff for Keyword
        id: scan
        run: |
          git fetch origin ${{ github.base_ref }}
          KEYWORDS="THATSCHEMA|BRAZE|AUDITBOARD"
          
          if git diff origin/${{ github.base_ref }}...HEAD | grep "^\+" | grep -Ei "$KEYWORDS"; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify Mandatory Reviewers
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isMatch = "${{ steps.scan.outputs.match }}" === "true";
            const prNumber = context.payload.pull_request ? context.payload.pull_request.number : context.issue.number;
            const orgName = context.repo.owner;
            const repoName = context.repo.repo;
            
            const mandatoryUsers = ["pangan"]; 
            
            if (!isMatch) {
              console.log("✅ No sensitive keywords found.");
              return;
            }
            
            // 1. Ensure reviewers are requested
            await github.rest.pulls.requestReviewers({
              owner: orgName,
              repo: repoName,
              pull_number: prNumber,
              reviewers: mandatoryUsers,
              team_reviewers: []
            });
            
            // 2. Fetch all reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: orgName,
              repo: repoName,
              pull_number: prNumber,
            });
            
            const latestReviews = {};
            reviews.forEach(r => { latestReviews[r.user.login] = r.state; });
            
            let missingApprovals = [];
            for (const user of mandatoryUsers) {
              if (latestReviews[user] !== 'APPROVED') {
                missingApprovals.push(`@${user}`);
              }
            }
            
            // 3. THE FIX: Logic for failing vs warning
            if (missingApprovals.length > 0) {
              // Only trigger a HARD FAILURE (Red X) if a review was submitted
              // but the mandatory user is still missing.
              if (context.eventName === 'pull_request_review') {
                core.setFailed(`🛑 Mandatory approval missing from: ${missingApprovals.join(', ')}`);
              } else {
                // On initial 'pull_request' open/sync, we log a warning.
                // This stays GREEN/YELLOW in the UI, avoiding the "Permanent Red X".
                console.log(`⚠️ Waiting for mandatory reviews from: ${missingApprovals.join(', ')}`);
              }
            } else {
              console.log("✅ Mandatory approval present!");
            }