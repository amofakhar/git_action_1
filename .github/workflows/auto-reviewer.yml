name: Checking for 3rd party Datasharing review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  enforce-review:
    name: Security Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: write # Required to update the status check manually
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan and Enforce
        uses: actions/github-script@v7
        with:
          script: |
            // 1. Scan for Keywords
            const { execSync } = require('child_process');
            execSync('git fetch origin ${ { github.base_ref } }');
            const diff = execSync('git diff origin/${ { github.base_ref } }...HEAD').toString();
            const keywords = /THATSCHEMA|BRAZE|AUDITBOARD/i;
            const addedLines = diff.split('\n').filter(line => line.startsWith('+'));
            const isMatch = addedLines.some(line => keywords.test(line));

            const prNumber = context.issue.number;
            const mandatoryUser = "pangan";

            if (!isMatch) {
              console.log("✅ No keywords found. Passing gate.");
              return;
            }

            // 2. Keywords found: Request pangan
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              reviewers: [mandatoryUser]
            });

            // 3. Check for Approval
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const hasApproved = reviews.some(r => r.user.login === mandatoryUser && r.state === 'APPROVED');

            // 4. THE HARD BLOCK
            // If pangan hasn't approved, we FAIL the action. 
            // Because this is a "Required Status Check", it blocks the merge button.
            if (!hasApproved) {
              core.setFailed(`🛑 STOP: This PR contains data-sharing keywords. It CANNOT be merged until @${mandatoryUser} approves it.`);
            } else {
              console.log(`✅ @${mandatoryUser} has approved. Access granted.`);
            }