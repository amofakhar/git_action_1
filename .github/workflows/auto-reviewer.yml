name: Checking for 3rd party Datasharing review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-diff:
    name: Mandatory Data Review Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history so we have a merge base

      - name: Scan Diff for Keyword
        id: scan
        run: |
          # 1. Safely get the base branch name for both PR and Review events
          BASE_BRANCH=${{ github.event.pull_request.base.ref }}
          
          # 2. Fetch the base branch history
          git fetch origin $BASE_BRANCH
          
          # 3. Get the specific SHAs
          # Use the head SHA from the payload to be precise
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          BASE_SHA=origin/$BASE_BRANCH
          
          echo "Comparing $BASE_SHA to $HEAD_SHA"
          
          # 4. Run the diff
          if git diff $BASE_SHA..$HEAD_SHA | grep "^\+" | grep -Ei "THATSCHEMA|BRAZE|AUDITBOARD"; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "Keyword found."
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "No keywords found."
          fi

      - name: Verify Mandatory Reviewers
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isMatch = "${{ steps.scan.outputs.match }}" === "true";
            const prNumber = context.payload.pull_request ? context.payload.pull_request.number : context.issue.number;
            const mandatoryUser = "pangan";

            if (!isMatch) {
              console.log("✅ No keywords found. Gate passed.");
              return;
            }

            // 1. Request pangan
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              reviewers: [mandatoryUser]
            });

            // 2. Fetch all reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // 3. Find if Pangan has an APPROVED state
            const hasApproved = reviews.some(r => r.user.login === mandatoryUser && r.state === 'APPROVED');

            if (!hasApproved) {
              core.setFailed(`🛑 BLOCKING MERGE: @${mandatoryUser} must approve this PR because data-sharing keywords were found.`);
            } else {
              console.log(`✅ @${mandatoryUser} approved. Gate unlocked.`);
            }