name: Checking for 3rd party Datasharing review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-diff:
    # THIS NAME IS WHAT YOU MUST SELECT IN SETTINGS
    name: Mandatory Data Review Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Diff for Keyword
        id: scan
        run: |
          git fetch origin ${{ github.base_ref }}
          KEYWORDS="THATSCHEMA|BRAZE|AUDITBOARD"
          
          if git diff origin/${{ github.base_ref }}...HEAD | grep "^\+" | grep -Ei "$KEYWORDS"; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify Mandatory Reviewers
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isMatch = "${{ steps.scan.outputs.match }}" === "true";
            const prNumber = context.payload.pull_request ? context.payload.pull_request.number : context.issue.number;
            const mandatoryUser = "pangan";

            if (!isMatch) {
              console.log("✅ No keywords found. Gate passed.");
              return;
            }

            // 1. Request pangan (even if they were already requested)
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              reviewers: [mandatoryUser]
            });

            // 2. Get all reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // 3. Find the LATEST approval from pangan
            const hasApproved = reviews.some(r => r.user.login === mandatoryUser && r.state === 'APPROVED');

            // 4. THE HARD GATE
            if (!hasApproved) {
              // This FAIL is what blocks the Merge Button
              core.setFailed(`🛑 BLOCKING MERGE: @${mandatoryUser} must approve this PR because data-sharing keywords were found.`);
            } else {
              console.log(`✅ @${mandatoryUser} approved. Gate unlocked.`);
            }