name: Checking for 3rd party Datasharing review
on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-diff:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Diff for Keyword
        id: scan
        run: |
          git fetch origin ${{ github.base_ref }}
          KEYWORDS="THATSCHEMA|BRAZE|AUDITBOARD"
          
          if git diff origin/${{ github.base_ref }}...HEAD | grep "^\+" | grep -Ei "$KEYWORDS"; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify Mandatory Reviewers
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isMatch = "${{ steps.scan.outputs.match }}" === "true";
            const prNumber = context.payload.pull_request.number;
            const orgName = context.repo.owner;
            const repoName = context.repo.repo;
            
            const mandatoryUsers = ["pangan"]; 
            const mandatoryTeams = []; 
            
            if (!isMatch) {
              console.log("✅ No sensitive keywords found.");
              return;
            }
            
            // 1. Always request reviewers if keywords match
            await github.rest.pulls.requestReviewers({
              owner: orgName,
              repo: repoName,
              pull_number: prNumber,
              reviewers: mandatoryUsers,
              team_reviewers: mandatoryTeams
            });
            
            // 2. Fetch reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: orgName,
              repo: repoName,
              pull_number: prNumber,
            });
            
            const latestReviews = {};
            reviews.forEach(r => { latestReviews[r.user.login] = r.state; });
            
            let missing = [];
            mandatoryUsers.forEach(u => { if (latestReviews[u] !== 'APPROVED') missing.push(`@${u}`); });
            
            // 3. THE MAGIC LOGIC:
            // If it's a review event, we FAIL if missing.
            // If it's just the PR Opening, we DON'T fail, so we don't leave a "Permanent Red X".
            if (missing.length > 0) {
              if (context.eventName === 'pull_request_review') {
                core.setFailed(`🛑 Still waiting for approval from: ${missing.join(', ')}`);
              } else {
                // This makes the check "Neutral" (Gray/Yellow) instead of "Failed" (Red) 
                // on the very first run, so it doesn't look like a permanent error.
                console.log(`⚠️ Initial scan: Waiting for ${missing.join(', ')} to approve.`);
              }
            } else {
              console.log("✅ All mandatory approvals present!");
            }