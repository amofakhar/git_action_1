name: Auto Reviewer by Diff Keyword
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Diff for Keyword
        id: scan
        run: |
          # Fetch the base branch to compare against
          git fetch origin ${{ github.base_ref }}
          
          # Look for "CONFIDENTIAL" in added lines (+) only
          # Replace 'CONFIDENTIAL' with your keyword
          if git diff origin/${{ github.base_ref }}...HEAD | grep "^\+" | grep -i "THATSCHEMA"; then
            echo "match=true" >> $GITHUB_OUTPUT
          fi

      - name: Assign Team
        if: steps:scan.outputs.match == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: ['pangan'],
              team_reviewers: ['security-team-slug']
            })