name: Checking for 3rd party Datasharing review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-diff:
    name: Mandatory Data Review # This is the name that shows in the PR list
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Diff for Keyword
        id: scan
        run: |
          git fetch origin ${{ github.base_ref }}
          KEYWORDS="THATSCHEMA|BRAZE|AUDITBOARD"
          
          if git diff origin/${{ github.base_ref }}...HEAD | grep "^\+" | grep -Ei "$KEYWORDS"; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Enforce Review Gates
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isMatch = "${{ steps.scan.outputs.match }}" === "true";
            const prNumber = context.payload.pull_request.number;
            const orgName = context.repo.owner;

            // --- CONFIGURATION ---
            const mandatoryUsers = ["pangan"]; 
            const mandatoryTeams = ["my-team-slug"]; 
            // ---------------------

            if (!isMatch) {
              console.log("✅ No keywords found. Skipping mandatory review.");
              return;
            }

            // 1. Ensure reviewers are assigned
            await github.rest.pulls.requestReviewers({
              owner: orgName,
              repo: context.repo.repo,
              pull_number: prNumber,
              reviewers: mandatoryUsers,
              team_reviewers: mandatoryTeams
            });

            // 2. Fetch Latest Reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: orgName,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const latestReviewState = {};
            reviews.forEach(r => {
              latestReviewState[r.user.login] = r.state;
            });

            let missing = [];

            // 3. Check Users
            for (const user of mandatoryUsers) {
              if (latestReviewState[user] !== 'APPROVED') {
                missing.push(`@${user}`);
              }
            }

            // 4. Check Teams
            for (const team of mandatoryTeams) {
              const { data: members } = await github.rest.teams.listMembersInOrg({
                org: orgName,
                team_slug: team,
              });
              const isTeamApproved = members.some(m => latestReviewState[m.login] === 'APPROVED');
              if (!isTeamApproved) {
                missing.push(`Team: ${team}`);
              }
            }

            // 5. THE HARD GATE
            if (missing.length > 0) {
              // This message appears directly in the PR "Checks" area
              core.setFailed(`Review Required: ${missing.join(' & ')} must approve because sensitive keywords were found.`);
            } else {
              console.log("✅ All mandatory reviews confirmed.");
            }