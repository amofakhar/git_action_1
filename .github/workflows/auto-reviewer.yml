name: Checking for 3rd party Datasharing review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-diff:
    name: Mandatory Data Review Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      checks: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history so we have a merge base

      - name: Scan Diff for Keyword
        id: scan
        run: |
          # 1. Safely get the base branch name for both PR and Review events
          BASE_BRANCH=${{ github.event.pull_request.base.ref }}
          
          # 2. Fetch the base branch history
          git fetch origin $BASE_BRANCH
          
          # 3. Get the specific SHAs
          # Use the head SHA from the payload to be precise
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          BASE_SHA=origin/$BASE_BRANCH
          
          echo "Comparing $BASE_SHA to $HEAD_SHA"
          
          # 4. Run the diff
          if git diff $BASE_SHA..$HEAD_SHA | grep "^\+" | grep -Ei "THATSCHEMA|BRAZE|AUDITBOARD"; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "Keyword found."
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "No keywords found."
          fi

      - name: Update Unified Status Gate
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isMatch = "${{ steps.scan.outputs.match }}" === "true";
            const pr = context.payload.pull_request;
            const prNumber = pr ? pr.number : context.issue.number;
            const headSha = pr ? pr.head.sha : context.payload.review.commit_id;
            const mandatoryUser = "pangan";
            const checkName = "Data Sharing Security Gate"; // ONE FIXED NAME

            if (!isMatch) {
              await github.rest.checks.create({
                ...context.repo,
                name: checkName,
                head_sha: headSha,
                status: 'completed',
                conclusion: 'success',
                output: { title: 'Security Gate Passed', summary: 'No keywords found.' }
              });
              return;
            }

            // 1. Get Reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              ...context.repo,
              pull_number: prNumber,
            });

            const hasApproved = reviews.some(r => r.user.login === mandatoryUser && r.state === 'APPROVED');

            // 2. Determine Status
            const conclusion = hasApproved ? 'success' : 'failure';
            const summary = hasApproved 
              ? `Approved by @${mandatoryUser}` 
              : `Waiting for @${mandatoryUser} to approve.`;

            // 3. Update/Create the SINGLE check line
            await github.rest.checks.create({
              ...context.repo,
              name: checkName,
              head_sha: headSha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: 'Data Sharing Review Required',
                summary: summary
              }
            });

            // 4. Request Reviewer if missing
            if (!hasApproved) {
              await github.rest.pulls.requestReviewers({
                ...context.repo,
                pull_number: prNumber,
                reviewers: [mandatoryUser]
              });
              // We also fail the job itself to keep the UI consistent
              core.setFailed(summary);
            }